# Release workflow.
#
# Trigger:  push a tag matching `v*` (e.g. `v0.0.1`, `v0.1.0-beta.1`).
#
# Local prep:  run `bash scripts/release.sh` to bump the version in
#   Cargo.toml + npm/**/package.json, then commit + tag.
#
# Strategy:
#   1. `build` — matrix-build the relay binary on native runners for each
#      target triple. Each job uploads its binary as a GitHub Actions artifact
#      named `relay-<platform>-<arch>`.
#   2. `publish-npm` — depends on `build`. Downloads every artifact, drops
#      each binary into the matching `npm/platforms/<plat>-<arch>/bin/`
#      directory, then `npm publish`es all 6 platform packages followed by
#      the wrapper.
#   3. `create-github-release` — depends on `build`. Uses `changelogithub`
#      to generate a GitHub Release from conventional commits, then attaches
#      per-platform binary archives.
#   4. `sync-homebrew` — depends on `create-github-release`. Copies the
#      formula from pkg/brew/relay.rb, fills in version + sha256 placeholders
#      from pre-computed values, and pushes to ffgenius/homebrew-tap.
#
# Required secrets:
#   - NPM_TOKEN  — npm automation token with publish permission on the
#                  `@ffgenius` scope.
#   - HOMEBREW_TAP_TOKEN — GitHub PAT with write permission on
#                  ffgenius/homebrew-tap (public_repo scope).

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed if we later attach binaries to a GH Release

jobs:
  build:
    name: build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe: relay
          - platform: linux
            arch: arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            exe: relay
            cross: true
          - platform: darwin
            arch: x64
            runner: macos-14         # cross-compile on apple-silicon (macos-13 retired)
            target: x86_64-apple-darwin
            exe: relay
          - platform: darwin
            arch: arm64
            runner: macos-14         # apple silicon, native
            target: aarch64-apple-darwin
            exe: relay
          - platform: win32
            arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            exe: relay.exe
          - platform: win32
            arch: arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            exe: relay.exe
    steps:
      - uses: actions/checkout@v7

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross (linux arm64)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: relay-${{ matrix.platform }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/${{ matrix.exe }}
          if-no-files-found: error

  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: download all binaries
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: stage binaries into platform packages
        run: |
          set -euo pipefail
          for plat_arch in win32-x64 win32-arm64 linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            mkdir -p "npm/platforms/${plat_arch}/bin"
            case "$plat_arch" in
              win32-*) src_name="relay.exe"; dst_name="relay.exe" ;;
              *)       src_name="relay";     dst_name="relay"     ;;
            esac
            cp "dist/relay-${plat_arch}/${src_name}" "npm/platforms/${plat_arch}/bin/${dst_name}"
            # Unix binaries: ensure executable bit. (Lost on artifact upload otherwise.)
            if [ "${plat_arch}" != "win32-x64" ] && [ "${plat_arch}" != "win32-arm64" ]; then
              chmod +x "npm/platforms/${plat_arch}/bin/${dst_name}"
            fi
          done
          # Verify nothing's missing.
          find npm/platforms -name 'relay*' -ls

      - name: publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for plat_arch in win32-x64 win32-arm64 linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            echo "::group::publish @ffgenius/relay-${plat_arch}"
            npm publish ./npm/platforms/${plat_arch} --access public
            echo "::endgroup::"
          done

      - name: publish wrapper
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Copy top-level README into the wrapper package so npmjs.com
          # renders the same content as the GitHub README.
          cp README.md npm/relay/README.md
          npm publish ./npm/relay --access public

  # ── GitHub Release ─────────────────────────────────────────────────────
  #
  # Creates a GitHub Release with per-platform archives attached.
  # These archives are used by:
  #   - install.sh  (curl / wget pipe-to-shell)
  #   - install.ps1 (PowerShell irm | iex)
  #   - Homebrew    (ffgenius/tap formula)
  #
  # Archives follow the convention:
  #   relay-<version>-<platform>-<arch>.tar.gz   (Unix)
  #   relay-<version>-<platform>-<arch>.zip      (Windows)
  #
  # Each archive contains a single top-level directory with the binary
  # inside, e.g.:
  #   relay-0.0.6-linux-x64/
  #     relay
  create-github-release:
    name: create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # 1. Create GitHub Release with conventional-commits changelog.
      - name: generate changelog and create release
        run: npx changelogithub --no-group
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Download build artifacts and create per-platform archives.
      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: create per-platform archives
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          echo "::group::packaging archives for $TAG (version $VERSION)"

          # Write sha256 hashes in shell-var format for the formula sync step.
          SHA256_FILE="sha256.env"
          > "$SHA256_FILE"

          for plat_arch in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            dir="relay-${VERSION}-${plat_arch}"
            mkdir -p "$dir"
            cp "dist/relay-${plat_arch}/relay" "$dir/relay"
            chmod +x "$dir/relay"
            tar -czf "relay-${VERSION}-${plat_arch}.tar.gz" "$dir"
            echo "  → relay-${VERSION}-${plat_arch}.tar.gz"
            HASH="$(sha256sum "relay-${VERSION}-${plat_arch}.tar.gz" | cut -d' ' -f1)"
            echo "SHA256_$(echo "${plat_arch}" | tr 'a-z-' 'A-Z_')=${HASH}" >> "$SHA256_FILE"
            echo "    sha256: ${HASH}"
          done

          for plat_arch in win32-x64 win32-arm64; do
            dir="relay-${VERSION}-${plat_arch}"
            mkdir -p "$dir"
            cp "dist/relay-${plat_arch}/relay.exe" "$dir/relay.exe"
            zip -r "relay-${VERSION}-${plat_arch}.zip" "$dir"
            echo "  → relay-${VERSION}-${plat_arch}.zip"
            HASH="$(sha256sum "relay-${VERSION}-${plat_arch}.zip" | cut -d' ' -f1)"
            echo "SHA256_$(echo "${plat_arch}" | tr 'a-z-' 'A-Z_')=${HASH}" >> "$SHA256_FILE"
            echo "    sha256: ${HASH}"
          done

          echo "VERSION=${VERSION}" >> "$SHA256_FILE"
          echo "::endgroup::"

          # Persist for the formula sync step.
          cat "$SHA256_FILE" >> "$GITHUB_ENV"

      # 3. Attach binary archives to the release created in step 1.
      - name: upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            relay-*.tar.gz
            relay-*.zip
          fail_on_unmatched_files: true

      # 4. Persist sha256.env for the sync-homebrew job.
      - name: upload sha256 manifest
        uses: actions/upload-artifact@v7
        with:
          name: sha256.env
          path: sha256.env
          if-no-files-found: error

  # ── Homebrew Sync ─────────────────────────────────────────────────────────
  #
  # Runs after the GitHub Release is created. Downloads the sha256 manifest
  # computed above, then pushes the completed formula to ffgenius/homebrew-tap.
  sync-homebrew:
    name: sync to homebrew tap
    needs: create-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: download sha256 manifest
        uses: actions/download-artifact@v8
        with:
          name: sha256.env

      - name: push formula to tap repo
        env:
          TAP_REPO: ffgenius/homebrew-tap
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          source sha256.env
          export TAP_REPO TAP_TOKEN VERSION \
            SHA256_DARWIN_ARM64 SHA256_DARWIN_X64 \
            SHA256_LINUX_ARM64 SHA256_LINUX_X64
          bash scripts/sync-brew.sh

