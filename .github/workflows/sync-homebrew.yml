# Sync Homebrew formula to ffgenius/homebrew-tap
#
# Trigger: push to master that touches pkg/brew/relay.rb, or manual dispatch.
#
# NOTE:  the release workflow (release.yml) also syncs the formula after
# creating a GitHub Release — that path receives pre-computed sha256 hashes
# directly, so it is faster and more reliable.
#
# Required secret:
#   HOMEBREW_TAP_TOKEN — GitHub PAT with write permission on
#   ffgenius/homebrew-tap (only needs public_repo scope).

name: sync-homebrew

on:
  push:
    branches:
      - master
    paths:
      - pkg/brew/relay.rb
  workflow_dispatch:

jobs:
  sync:
    name: sync to ffgenius/homebrew-tap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: compute sha256 and sync
        env:
          TAP_REPO: ffgenius/homebrew-tap
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          bash scripts/compute-sha256.sh
          source sha256.env
          export TAP_REPO TAP_TOKEN VERSION \
            SHA256_DARWIN_ARM64 SHA256_DARWIN_X64 \
            SHA256_LINUX_ARM64 SHA256_LINUX_X64
          bash scripts/sync-brew.sh
